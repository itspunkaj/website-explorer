<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}KG Explorer{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }

    /* Nav */
    nav { background: #1a1d27; border-bottom: 1px solid #2d3148; padding: 12px 32px; display: flex; align-items: center; gap: 16px; }
    nav a { color: #a78bfa; text-decoration: none; font-weight: 600; font-size: 15px; }
    nav .logo { font-size: 18px; font-weight: 700; color: #fff; margin-right: auto; }

    /* Layout */
    .container { max-width: 1300px; margin: 0 auto; padding: 32px 24px; }

    /* Cards */
    .card { background: #1a1d27; border: 1px solid #2d3148; border-radius: 12px; padding: 20px; }

    /* Badges */
    .badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .badge-green  { background: #064e3b; color: #6ee7b7; }
    .badge-yellow { background: #451a03; color: #fbbf24; }
    .badge-red    { background: #450a0a; color: #fca5a5; }
    .badge-blue   { background: #1e3a5f; color: #93c5fd; }
    .badge-gray   { background: #1f2937; color: #9ca3af; }

    /* Stat chips */
    .stat-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
    .stat { background: #252840; border: 1px solid #3d4166; border-radius: 8px; padding: 10px 18px; text-align: center; }
    .stat .num { font-size: 24px; font-weight: 700; color: #a78bfa; }
    .stat .lbl { font-size: 11px; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px; }

    /* Flow card */
    .flow-card { background: #12141e; border: 1px solid #2d3148; border-radius: 10px; padding: 16px; margin-bottom: 12px; }
    .flow-card.missed { border-color: #92400e; background: #1a1208; }
    .flow-title { font-weight: 600; font-size: 15px; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
    .flow-desc { font-size: 13px; color: #94a3b8; margin-bottom: 10px; }
    .flow-steps { list-style: none; }
    .flow-steps li { font-size: 13px; color: #cbd5e1; padding: 3px 0; padding-left: 18px; position: relative; }
    .flow-steps li::before { content: counter(step); counter-increment: step; position: absolute; left: 0; font-size: 11px; color: #a78bfa; font-weight: 700; }
    .flow-steps { counter-reset: step; }
    .test-cases { margin-top: 10px; }
    .test-cases .tc { font-size: 12px; color: #86efac; background: #052e16; border-radius: 4px; padding: 3px 8px; display: inline-block; margin: 2px 2px 2px 0; }

    /* Spinner */
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #4c4f69; border-top-color: #a78bfa; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Section headers */
    .section-header { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #6366f1; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }

    /* Misc */
    .text-muted { color: #6b7280; font-size: 13px; }
    .mt-2 { margin-top: 8px; }
    .mt-3 { margin-top: 16px; }
    .mb-1 { margin-bottom: 4px; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav>
    <span class="logo">🕸 KG Explorer</span>
    <a href="/">Home</a>
  </nav>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
